[project]
name = "xero"
version = "0.0.13"
description = "Python SDK for Xero API generated by OpenAPI spec for oAuth2"
readme = "README.md"
license = "MIT"
dependencies = [
    "pydantic>=1.10,<2",
    "python-dateutil>=2.7",
    "aiohttp>=3.0.0",
    "certifi",
    "setuptools>=75.1.0",
    "multidict>=6.0.0",
]
requires-python = ">=3.8"

[dependency-groups]
dev = ["pytest", "pytest-vcr", "pyyaml"]

[tool.uv.build-backend]
module-name = "xero"
module-root = "."

[build-system]
requires = ["uv_build>=0.9.28,<0.10.0"]
build-backend = "uv_build"
