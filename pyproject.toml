[project]
name = "xero"
version = "0.1.0"
description = "Python SDK for Xero API generated by OpenAPI spec for oAuth2"
readme = "README.md"
license = "MIT"
dependencies = [
  "pydantic>=2,<3",
  "python-dateutil>=2.7",
  "aiohttp>=3.0.0",
  "certifi",
  "setuptools>=75.1.0",
  "multidict>=6.0.0",
]
requires-python = ">=3.12"

[dependency-groups]
dev = ["pytest", "pytest-vcr", "pyyaml", "ruff"]

[tool.uv.build-backend]
module-name = "xero"
module-root = "."
[tool.ruff]
target-version = "py312"
line-length = 120
exclude = ["app/schema/xero/"]

[tool.ruff.lint]
ignore = [
  # E501 and W191 can conflict with black formatting.
  "E501",
  "W191",
  # E741 we have no control over most ambiguous variable names
  "E741",
  # UP040 warns about the deprecation of TypeAlias, as Python 3.12 introduced
  # the PEP 695 syntax for type aliases, but this is not yet supported by
  # Pydantic.
  "UP040",
  # UP046 and UP047 are about type parameter syntax, which our version of
  # Pydantic does not like.
  "UP046",
  "UP047",
  "TRY002", # Do not require use of custom exceptions
  "TRY003", # Do not require error messages to be a variable
  "TRY301", # Allow raising exceptions in try blocks
  "RUF001", # Ambiguous characters come directly from the OpenAPI spec.
  "RUF012", # Not Pydantic friendly.
]
select = [
  "B",
  "C4",
  "E",
  "F",
  "FAST",
  "FURB",
  "I001",
  "INP",
  "PIE",
  "RET",
  "RUF",
  "TRY",
  "UP",
  "W",
]

[tool.ruff.lint.mccabe]
max-complexity = 20

[tool.ruff.lint.isort]
split-on-trailing-comma = false

[tool.ruff.format]
quote-style = "double"
skip-magic-trailing-comma = true

[build-system]
requires = ["uv_build>=0.11,<0.12"]
build-backend = "uv_build"
